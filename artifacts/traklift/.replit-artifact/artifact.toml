kind = "web"
previewPath = "/"
title = "TrakLift"
version = "1.0.0"
id = "artifacts/traklift"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21388

[services.development]
run = "pnpm --filter @workspace/traklift run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/traklift", "run", "build" ]
publicDir = "artifacts/traklift/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21388"
BASE_PATH = "/"
